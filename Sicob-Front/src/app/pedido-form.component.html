<div class="card">
  <div class="card-header">Novo Pedido</div>
  <div class="card-body">
    <div class="mb-3">
      <label class="form-label">Cliente</label>
      <input class="form-control" [(ngModel)]="cliente" [disabled]="loading" />
    </div>
    <div class="mb-3">
      <label class="form-label">Produto</label>
      <input class="form-control" [(ngModel)]="produto" [disabled]="loading" />
    </div>
    <div class="mb-3">
      <label class="form-label">Quantidade</label>
      <input type="number" class="form-control" [(ngModel)]="quantidade" [disabled]="loading" />
    </div>
    <button class="btn btn-primary" (click)="criarPedido()" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
      Criar Pedido
    </button>
    <div class="mt-3">
      <div *ngIf="message" [ngClass]="{'alert': true, 'alert-success': message.type==='success', 'alert-danger': message.type==='error', 'alert-info': message.type==='info'}">{{message.text}}</div>
    </div>
  </div>
</div>
